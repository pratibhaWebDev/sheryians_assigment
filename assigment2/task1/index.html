<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights & Blogs | ScaleX</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <img src="extracted_images/logo.png" alt="ScaleX Logo" id="site-logo">
            </div>
            <ul class="nav-links">
                <li><a href="#" id="nav-home">Home</a></li>
                <li><a href="#" id="nav-about">About Us</a></li>
                <li><a href="#" id="nav-blogs" class="active">Blogs</a></li>
                <li><a href="#" id="nav-contact">Contact Us</a></li>
            </ul>
            <div class="nav-actions">
                <a href="#" class="btn-primary" id="btn-get-started">Get Started</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1 id="main-heading">Insights & Blogs</h1>
        </section>

        <section class="filters">
            <button class="filter-chip active" id="filter-all">All</button>
            <button class="filter-chip" id="filter-tech">Tech</button>
            <button class="filter-chip" id="filter-saas">SaaS</button>
            <button class="filter-chip" id="filter-marketing">Marketing</button>
        </section>

        <section class="blog-grid">
            <!-- Card 1 -->
            <article class="blog-card" id="card-1">
                <div class="card-image">
                    <img src="extracted_images/image_martini.png" alt="SaaS Marketing Guide">
                </div>
                <div class="card-content">
                    <span class="category-tag" id="tag-1">Tech</span>
                    <h2 class="blog-title">The Ultimate Guide To SaaS Marketing</h2>
                    <p class="blog-date">May 23, 2025</p>
                </div>
            </article>

            <!-- Card 2 -->
            <article class="blog-card" id="card-2">
                <div class="card-image">
                    <img src="extracted_images/image_chair.png" alt="SaaS Growth Trends">
                </div>
                <div class="card-content">
                    <span class="category-tag" id="tag-2">SaaS</span>
                    <h2 class="blog-title">5 Key Trends In SaaS Growth For 2025</h2>
                    <p class="blog-date">May 23, 2025</p>
                </div>
            </article>

            <!-- Card 3 -->
            <article class="blog-card" id="card-3">
                <div class="card-image">
                    <img src="extracted_images/image_cat.png" alt="Data-Driven Strategies">
                </div>
                <div class="card-content">
                    <span class="category-tag" id="tag-3">Marketing</span>
                    <h2 class="blog-title">How Data-Driven Strategies Are Important</h2>
                    <p class="blog-date">May 23, 2025</p>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 ScaleX. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
