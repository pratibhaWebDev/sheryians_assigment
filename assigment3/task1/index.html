<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Art Work | NFT Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="navbar">
            <div class="logo">
                <h1>NFT Universe</h1>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Explore</a>
                <a href="#">Marketplace</a>
                <a href="#">Community</a>
            </nav>
            <div class="nav-icons">
                <img src="assets/search.png" alt="Search" class="icon">
                <img src="assets/bag.png" alt="Cart" class="icon">
                <img src="assets/user.png" alt="Profile" class="icon">
            </div>
        </header>

        <section class="explore-section">
            <div class="section-header">
                <h2>Explore Art Work</h2>
                <a href="#" class="see-all">See All</a>
            </div>

            <div class="artwork-grid">
                <!-- Row 1 -->
                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/monocular.png" alt="Monocular">
                    </div>
                    <div class="artwork-info">
                        <h3>Monocular</h3>
                        <span class="price">54.8k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/horns_mask.png" alt="Horns Mask">
                    </div>
                    <div class="artwork-info">
                        <h3>Horns Mask</h3>
                        <span class="price">32.4k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/light_moon.png" alt="Light Moon">
                    </div>
                    <div class="artwork-info">
                        <h3>Light Moon</h3>
                        <span class="price">86.6k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/skull_wire.png" alt="Skull Wire">
                    </div>
                    <div class="artwork-info">
                        <h3>Skull Wire</h3>
                        <span class="price">78.9k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <!-- Row 2 -->
                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/spiderman.png" alt="Spiderman">
                    </div>
                    <div class="artwork-info">
                        <h3>Spiderman</h3>
                        <span class="price">24.8k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/deadpool.png" alt="DeadPool">
                    </div>
                    <div class="artwork-info">
                        <h3>DeadPool</h3>
                        <span class="price">59.7k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/white_eye.png" alt="White Eye">
                    </div>
                    <div class="artwork-info">
                        <h3>White Eye</h3>
                        <span class="price">45.7k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>

                <div class="artwork-card">
                    <div class="artwork-image">
                        <img src="assets/artworks/plastic_spinal.png" alt="Plastic Spinal">
                    </div>
                    <div class="artwork-info">
                        <h3>Plastic Spinal</h3>
                        <span class="price">98.6k <img src="assets/heart.png" alt="Heart" class="small-icon"></span>
                    </div>
                    <button class="bid-btn">Place Bid</button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
